<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=3.0, minimum-scale=0.3">
    <title>شجرة الدرواشة - عشيرة العليان</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f4f8, #f0f8ff, #e6f0fa, #ffffff);
            background-size: 400% 400%; animation: bgMove 20s ease infinite;
            color: #2c3e50; height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            touch-action: manipulation; position: relative;
        }
        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header {
            width: 100%; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
            z-index: 10; position: relative;
        }
        .title-group { display: flex; flex-direction: column; align-items: flex-start; }
        .main-title { font-size: 1.2em; font-weight: bold; background: linear-gradient(45deg, #1a5276, #2e86c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-title { font-size: 0.75em; background: linear-gradient(45deg, #1a5276, #2e86c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0.8; }
        .header-buttons { display: flex; gap: 8px; }
        .btn-icon {
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(52,152,219,0.3);
            color: #2c3e50; width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            font-size: 1.1em; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .btn-icon.active-manager { background: #f0a500 !important; color: white !important; border-color: #f0a500 !important; }
        .tree-container {
            flex: 1; width: 100%; overflow: hidden; position: relative; cursor: grab; z-index: 1;
            touch-action: pan-x pan-y pinch-zoom;
        }
        .tree {
            position: absolute; top: 50%; left: 50%; transform-origin: 0 0;
            display: flex; flex-direction: column; align-items: center; padding: 40px; will-change: transform;
        }
        .branch { display: flex; flex-direction: column; align-items: center; position: relative; }
        .branch.has-children > .card { margin-bottom: 40px; }
        .card {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(15px);
            border: 2px solid rgba(52,152,219,0.2); border-radius: 18px; padding: 14px 24px;
            text-align: center; min-width: 130px; transition: 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            position: relative; z-index: 2; border-color: var(--branch-color, rgba(52,152,219,0.3));
        }
        .card .name { font-size: 1em; font-weight: bold; color: var(--branch-color, #2c3e50); white-space: nowrap; }
        .card .status-badge { font-size: 0.7em; opacity: 0.7; margin-top: 4px; color: #555; }
        .card.card-root-special {
            background: linear-gradient(135deg, #fff9e6, #ffedb3); border: 3px solid #f0a500;
            box-shadow: 0 0 0 5px rgba(240,165,0,0.15); border-radius: 24px; padding: 18px 32px;
        }
        .color-root > .card { --branch-color: #b7950b; }
        .color-khulaif > .card { --branch-color: #e67e22; }
        .color-aloosh > .card { --branch-color: #27ae60; }
        .color-hamid > .card { --branch-color: #2980b9; }
        .color-hamido > .card { --branch-color: #c0392b; }
        .branch.has-children > .card::after {
            content: ''; position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 40px; background: var(--branch-color); opacity: 0.5;
        }
        .children {
            display: flex; flex-direction: row; justify-content: center; gap: 20px;
            position: relative; padding-top: 40px;
        }
        .children > .branch::after {
            content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 40px; background: var(--branch-color); opacity: 0.5;
        }
        .welcome-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            justify-content: center; align-items: center; z-index: 200; flex-direction: column;
        }
        .welcome-overlay.active { display: flex; }
        .welcome-card {
            background: white; border: 2px solid #f0a500; border-radius: 24px; padding: 24px 20px;
            width: 340px; max-width: 90vw; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); color: #2c3e50;
        }
        .btn-close-welcome {
            margin-top: 15px; background: linear-gradient(45deg, #1a5276, #2980b9); color: white;
            border: none; padding: 10px 30px; border-radius: 25px; font-size: 0.95em; font-weight: bold; cursor: pointer;
        }
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal.active { display: flex; }
        .form-modal {
            background: white; border: 2px solid #f0a500; border-radius: 20px; padding: 20px;
            width: 320px; max-width: 90vw; text-align: right;
        }
        .form-modal h3 { text-align: center; margin-bottom: 12px; color: #f0a500; }
        .form-modal label { display: block; margin: 8px 0 3px; font-size: 0.85em; }
        .form-modal input { width: 100%; padding: 8px; border-radius: 10px; border: 1px solid #ccc; }
        .form-buttons { display: flex; gap: 8px; margin-top: 15px; justify-content: center; }
        .btn-save { background: #f0a500; color: white; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #333; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-group">
            <span class="main-title">🌳 شجرة الدرواشة</span>
            <span class="sub-title">قبيلة بني خالد - عشيرة العليان - فخذ الدرواشة</span>
        </div>
        <div class="header-buttons">
            <button class="btn-icon" id="toggleManager" title="تسجيل الدخول">🔐</button>
        </div>
    </div>

    <div class="tree-container" id="treeContainer">
        <div class="tree" id="familyTree"></div>
    </div>

    <!-- رسالة ترحيب -->
    <div class="welcome-overlay active" id="welcomeOverlay">
        <div class="welcome-card" id="welcomeMessage">
            <div class="welcome-icon">🌴</div>
            <h2>مرحباً بكم في شجرة الدرواشة</h2>
            <div class="welcome-text">مؤسس هذه الشجرة<br><strong>درويش العلياني</strong></div>
        </div>
        <button class="btn-close-welcome" id="closeWelcomeBtn">🌸 دخول</button>
    </div>

    <!-- نافذة تسجيل الدخول -->
    <div class="modal" id="loginModal">
        <div class="form-modal">
            <h3>🔐 تسجيل دخول</h3>
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور">
            <div class="form-buttons">
                <button class="btn-save" id="confirmLogin">🔓 دخول</button>
                <button class="btn-cancel" id="cancelLogin">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // ========== البيانات (data.js مدمجة) ==========
        var LOCAL_DATA = {
            name: "عليان", displayName: "عليان", birth: "1200", status: "متوفى رحمه الله",
            color: "#8B5A2B", isRoot: true, branchCode: "Z", customShape: "default", familyColor: "",
            children: [
                {
                    name: "هزيم العليان", displayName: "هزيم", birth: "1230", status: "متوفى رحمه الله",
                    color: "#8B5A2B", branchCode: "Z", customShape: "default", familyColor: "",
                    children: [
                        {
                            name: "عطشان الهزيم", displayName: "عطشان", birth: "1260", status: "متوفى رحمه الله",
                            color: "#8B5A2B", branchCode: "Z", customShape: "default", familyColor: "",
                            children: [
                                {
                                    name: "درويش العلياني", displayName: "درويش", birth: "1280", status: "متوفى رحمه الله",
                                    color: "color-root", branchCode: "D", customShape: "default", familyColor: "",
                                    children: [
                                        {
                                            name: "خليف الدرويش", displayName: "خليف", birth: "1320", status: "متوفى رحمه الله",
                                            color: "color-khulaif", branchCode: "H", customShape: "default", familyColor: "",
                                            children: [
                                                {
                                                    name: "محمد الخليف", displayName: "محمد", birth: "1360", status: "متوفى رحمه الله",
                                                    branchCode: "H", customShape: "default", familyColor: "",
                                                    children: [
                                                        {
                                                            name: "ذياب المحمد", displayName: "ذياب", birth: "1390", status: "حي أطال الله بعمره",
                                                            branchCode: "H", customShape: "default", familyColor: "",
                                                            children: [
                                                                { name: "محمد الذياب", displayName: "محمد", birth: "1420", status: "حي أطال الله بعمره", branchCode: "H", customShape: "default", familyColor: "" },
                                                                { name: "أحمد الذياب", displayName: "أحمد", birth: "1425", status: "حي أطال الله بعمره", branchCode: "H", customShape: "default", familyColor: "" },
                                                                { name: "خالد الذياب", displayName: "خالد", birth: "1430", status: "حي أطال الله بعمره", branchCode: "H", customShape: "default", familyColor: "" },
                                                                { name: "سيار الذياب", displayName: "سيار", birth: "1435", status: "حي أطال الله بعمره", branchCode: "H", customShape: "default", familyColor: "" }
                                                            ]
                                                        }
                                                    ]
                                                },
                                                { name: "حميد الخليف", displayName: "حميد", birth: "1365", status: "متوفى رحمه الله", branchCode: "H", customShape: "default", familyColor: "" },
                                                { name: "سليمه الخليف", displayName: "سليمه", birth: "1370", status: "متوفاه رحمها الله", branchCode: "H", customShape: "default", familyColor: "" }
                                            ]
                                        },
                                        { name: "علوش الدرويش", displayName: "علوش", birth: "1330", status: "متوفى رحمه الله", color: "color-aloosh", branchCode: "A", customShape: "default", familyColor: "", children: [] },
                                        { name: "محيميد الدرويش", displayName: "محيميد", birth: "1335", status: "متوفى رحمه الله", color: "color-hamid", branchCode: "M", customShape: "default", familyColor: "", children: [] },
                                        { name: "حميدو الدرويش", displayName: "حميدو", birth: "1340", status: "متوفى رحمه الله", color: "color-hamido", branchCode: "E", customShape: "default", familyColor: "", children: [] }
                                    ]
                                }
                            ]
                        },
                        {
                            name: "هملان الهزيم", displayName: "هملان", birth: "1265", status: "متوفى رحمه الله",
                            color: "#8B5A2B", branchCode: "Z", customShape: "default", familyColor: "",
                            children: [
                                { name: "عبلان الهملان", displayName: "عبلان", birth: "1290", status: "متوفى رحمه الله", branchCode: "Z", customShape: "default", familyColor: "" }
                            ]
                        }
                    ]
                }
            ]
        };

        // ========== النواة (core.js مدمجة) ==========
        var TreeCore = (function() {
            var rootData = LOCAL_DATA;
            var treeContainer, treeElement;

            function buildTree(data, parentData) {
                var branch = document.createElement('div');
                branch.className = 'branch';
                if (data.children && data.children.length) branch.classList.add('has-children');
                if (data.color) branch.classList.add(data.color);

                var card = document.createElement('div');
                card.className = 'card';
                if (data.isRoot) card.classList.add('card-root-special');
                if (data.customShape && data.customShape !== 'default') card.classList.add('card-shape-' + data.customShape);
                if (data.familyColor) {
                    card.style.borderColor = data.familyColor;
                    card.style.boxShadow = '0 6px 25px ' + data.familyColor + '40';
                }

                var displayName = data.displayName || data.name;
                card.innerHTML = '<div class="name">' + displayName + '</div>' +
                                 '<div class="status-badge">' + (data.status || '') + '</div>';

                branch.appendChild(card);

                if (data.children && data.children.length) {
                    var childrenDiv = document.createElement('div');
                    childrenDiv.className = 'children';
                    data.children.forEach(function(child) {
                        childrenDiv.appendChild(buildTree(child, data));
                    });
                    branch.appendChild(childrenDiv);
                }
                return branch;
            }

            function rebuildTree() {
                if (!treeElement) return;
                treeElement.innerHTML = '';
                treeElement.appendChild(buildTree(rootData));
            }

            return {
                init: function(containerId, treeId) {
                    treeContainer = document.getElementById(containerId);
                    treeElement = document.getElementById(treeId);
                    rebuildTree();
                },
                getRootData: function() { return rootData; },
                saveData: function() { localStorage.setItem('familyTreeData', JSON.stringify(rootData)); },
                rebuildTree: function() { rebuildTree(); }
            };
        })();

        // ========== المدير والصلاحيات (manager.js مدمجة) ==========
        var TreeManager = (function() {
            var managerMode = false;
            var currentUser = null;

            var passwords = JSON.parse(localStorage.getItem('treePasswords')) || {
                manager: '1234',
                guest: 'زائر',
                branches: { خليف: 'خليفات', علوش: 'علوش', محيميد: 'محيميد', حميدو: 'حميدو' }
            };

            function savePasswords() { localStorage.setItem('treePasswords', JSON.stringify(passwords)); }

            function login(password) {
                if (password === passwords.manager) {
                    currentUser = { type: 'manager', name: 'المدير', branch: 'عام' };
                    applyMode(); return true;
                } else if (password === passwords.guest) {
                    currentUser = { type: 'guest', name: 'زائر', branch: 'عام' };
                    applyMode(); return true;
                } else {
                    for (var branch in passwords.branches) {
                        if (password === passwords.branches[branch]) {
                            currentUser = { type: 'branch', name: branch, branch: branch };
                            applyMode(); return true;
                        }
                    }
                }
                return false;
            }

            function applyMode() {
                if (currentUser.type === 'manager') {
                    managerMode = true;
                    document.body.classList.add('show-manager');
                    document.getElementById('toggleManager').textContent = '🔓';
                    document.getElementById('toggleManager').classList.add('active-manager');
                } else {
                    managerMode = false;
                    document.body.classList.remove('show-manager');
                    document.getElementById('toggleManager').textContent = '🔐';
                    document.getElementById('toggleManager').classList.remove('active-manager');
                }
                showWelcome();
            }

            function showWelcome() {
                var welcomeDiv = document.getElementById('welcomeOverlay');
                var welcomeMsg = document.getElementById('welcomeMessage');
                if (!welcomeDiv || !welcomeMsg) return;

                if (currentUser.type === 'manager') {
                    welcomeMsg.innerHTML = '<div class="welcome-icon">👑</div><h2>موثق نسب أبناء درويش</h2><div class="welcome-text">حامل أمانة نسب الدراوشة<br><strong>من عشيرة العليان - بني خالد</strong></div>';
                } else if (currentUser.type === 'branch') {
                    welcomeMsg.innerHTML = '<div class="welcome-icon">🌴</div><h2>أهلاً بك في فخذ ' + currentUser.branch + '</h2><div class="welcome-text">مرحباً بك يا ابن ' + currentUser.branch + '<br>حفظ الله نسبكم وبارك ذريتكم</div>';
                } else if (currentUser.type === 'guest') {
                    welcomeMsg.innerHTML = '<div class="welcome-icon">🌴</div><h2>مرحباً بكم في شجرة الدرواشة</h2><div class="welcome-text">مؤسس هذه الشجرة<br><strong>درويش العلياني</strong></div>';
                }
                welcomeDiv.classList.add('active');
            }

            function logout() {
                currentUser = null; managerMode = false;
                document.body.classList.remove('show-manager');
                document.getElementById('toggleManager').textContent = '🔐';
                document.getElementById('toggleManager').classList.remove('active-manager');
                document.getElementById('welcomeOverlay').classList.remove('active');
            }

            function init() {
                document.getElementById('toggleManager').addEventListener('click', function() {
                    if (currentUser) { logout(); } else { document.getElementById('loginModal').classList.add('active'); }
                });
                document.getElementById('confirmLogin').addEventListener('click', function() {
                    var pass = document.getElementById('loginPassword').value;
                    if (login(pass)) { document.getElementById('loginModal').classList.remove('active'); }
                    else { alert('❌ كلمة مرور خاطئة'); }
                });
                document.getElementById('cancelLogin').addEventListener('click', function() {
                    document.getElementById('loginModal').classList.remove('active');
                });
                document.getElementById('closeWelcomeBtn').addEventListener('click', function() {
                    document.getElementById('welcomeOverlay').classList.remove('active');
                });
            }

            return {
                init: init,
                isManager: function() { return managerMode; },
                getCurrentUser: function() { return currentUser; },
                login: login,
                logout: logout
            };
        })();

        // ========== تشغيل كل شيء ==========
        TreeCore.init('treeContainer', 'familyTree');
        TreeManager.init();

        // ========== التكبير والتحريك ==========
        var container = document.getElementById('treeContainer');
        var tree = document.getElementById('familyTree');
        var scale = 1, posX = 0, posY = 0;
        function setTransform() { tree.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

        var initialDist = 0, initialScale = 1;
        var dragging = false, sx, sy, spx, spy;
        container.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialScale = scale;
            } else if (e.touches.length === 1 && !e.target.closest('.card')) {
                dragging = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY; spx = posX; spy = posY;
            }
        }, { passive: false });
        container.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (initialDist > 0) {
                    var ns = Math.min(3, Math.max(0.3, initialScale * (d / initialDist)));
                    var r = container.getBoundingClientRect();
                    var mx = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left;
                    var my = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top;
                    var f = ns / scale;
                    posX = mx - (mx - posX) * f; posY = my - (my - posY) * f; scale = ns;
                    setTransform();
                }
            } else if (dragging) {
                posX = spx + e.touches[0].clientX - sx; posY = spy + e.touches[0].clientY - sy;
                setTransform();
            }
        }, { passive: false });
        container.addEventListener('touchend', function() { initialDist = 0; dragging = false; });
        container.addEventListener('mousedown', function(e) {
            if (e.target.closest('.card')) return;
            dragging = true; sx = e.clientX; sy = e.clientY; spx = posX; spy = posY;
            container.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            posX = spx + e.clientX - sx; posY = spy + e.clientY - sy; setTransform();
        });
        window.addEventListener('mouseup', function() { dragging = false; container.style.cursor = 'grab'; });

        setTimeout(function() {
            var cr = container.getBoundingClientRect();
            var tr = tree.getBoundingClientRect();
            posX = (cr.width/2) - (tr.width/2);
            posY = (cr.height/2) - (tr.height/2);
            scale = window.innerWidth < 768 ? 0.7 : 1;
            setTransform();
        }, 400);
    </script>
</body>
</html>
