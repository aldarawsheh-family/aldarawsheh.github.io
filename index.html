<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة الدراوشة</title>
<meta name="description" content="شجرة عائلة الدراوشة - شجرة الدرواشة - عشيرة العليان - بني خالد">
<meta name="keywords" content="شجرة الدراوشة, الدرواشة, شجرة الدرويش, عائلة الدريويش, دراوشة, الدروشة, شجرة العائلة">
<meta name="robots" content="index, follow">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#0d1117;overflow:hidden;height:100vh;color:#e0d5c0;transition:all 0.5s ease}
.header-container{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:100;text-align:center;cursor:pointer;background:rgba(22,27,34,0.9);padding:5px 15px;border-radius:8px;border:1px solid rgba(212,165,116,0.3);width:auto;white-space:nowrap;transition:all 0.5s ease}
.title-row{display:flex;align-items:center;justify-content:center;gap:8px}
.title-row h1{font-size:0.9rem;color:#f0d9b5;margin:0;font-weight:700}
.falcon{font-size:1rem}
svg{width:100%;height:100vh;cursor:grab;display:block}
.link{fill:none;stroke:rgba(201,160,80,0.3);stroke-width:1.5px;transition:all 0.3s ease}
.link.highlight{stroke:#ffd700!important;stroke-width:3px!important}
.node-group text{font-size:10px;pointer-events:none;text-anchor:middle;font-weight:700;transition:all 0.3s ease}
.bottombar{position:fixed;bottom:0;left:0;right:0;height:40px;background:#161b22;border-top:1px solid #d4a574;display:flex;justify-content:center;align-items:center;gap:6px;z-index:100;transition:all 0.5s ease;flex-wrap:wrap;padding:2px}
button{background:rgba(212,165,116,0.1);color:#d4a574;border:1px solid #d4a574;padding:4px 8px;border-radius:8px;cursor:pointer;font-family:'Cairo';font-size:0.65rem;transition:all 0.3s ease;white-space:nowrap}
button:hover{background:rgba(212,165,116,0.2)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:2000;display:none;justify-content:center;align-items:center;backdrop-filter:blur(10px)}
.modal.on{display:flex}
.modalbox{background:#1c2128;border:2px solid #d4a574;border-radius:20px;padding:20px;width:90%;max-width:500px;text-align:center;max-height:85vh;overflow-y:auto;transition:all 0.5s ease}
.modalbox h2{color:#f0d9b5;margin-bottom:12px;font-size:1.1rem;border-bottom:1px solid #d4a574;padding-bottom:8px}
.highlight-text{color:#d4a574;font-weight:700}
input,select{width:100%;padding:8px;margin:6px 0;background:#0d1117;border:1px solid #d4a574;color:#fff;border-radius:8px;text-align:center;font-family:'Cairo';font-size:0.8rem}
.info-card{text-align:right;background:rgba(255,255,255,0.05);padding:12px;border-radius:12px;margin-top:8px;border-right:4px solid #d4a574}
.info-label{color:#d4a574;font-size:0.8rem;font-weight:bold;display:block;margin-bottom:4px}
