<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=3.0, minimum-scale=0.3">
    <title>شجرة الدرواشة - عشيرة العليان</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f4f8, #f0f8ff, #e6f0fa, #ffffff);
            background-size: 400% 400%; animation: bgMove 20s ease infinite;
            color: #2c3e50; height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            touch-action: manipulation; position: relative;
        }
        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header {
            width: 100%; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
            z-index: 10; position: relative; background: rgba(255,255,255,0.3); backdrop-filter: blur(5px);
        }
        .title-group { display: flex; flex-direction: column; align-items: flex-start; }
        .main-title { font-size: 1.2em; font-weight: bold; background: linear-gradient(45deg, #1a5276, #2e86c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-title { font-size: 0.75em; background: linear-gradient(45deg, #1a5276, #2e86c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0.8; }
        
        /* شريط الأزرار الجديد */
        .toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            z-index: 50;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-icon {
            background: rgba(255,255,255,0.9); border: 1px solid rgba(52,152,219,0.3);
            color: #2c3e50; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            font-size: 1.2em; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
        }
        .btn-icon:hover { background: rgba(255,255,255,1); transform: scale(1.1); border-color: #3498db; }
        .btn-icon.active-manager { background: #f0a500 !important; color: white !important; border-color: #f0a500 !important; }
        .btn-icon.toggle-active { background: #27ae60 !important; color: white !important; }

        .tree-container {
            flex: 1; width: 100%; overflow: hidden; position: relative; cursor: grab; z-index: 1;
            touch-action: pan-x pan-y pinch-zoom;
        }
        .tree {
            position: absolute; top: 50%; left: 50%; transform-origin: 0 0;
            display: flex; flex-direction: column; align-items: center; padding: 40px; will-change: transform;
        }
        .branch { display: flex; flex-direction: column; align-items: center; position: relative; }
        .branch.has-children > .card { margin-bottom: 40px; }
        .card {
            background: rgba(255,255,255,0.85); backdrop-filter: blur(15px);
            border: 2px solid rgba(52,152,219,0.2); border-radius: 18px; padding: 12px 20px;
            text-align: center; min-width: 110px; transition: 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            position: relative; z-index: 2; border-color: var(--branch-color, #888);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
        .card .name { font-size: 0.95em; font-weight: bold; color: var(--branch-color, #2c3e50); white-space: nowrap; cursor: pointer; }
        .card .status-badge { font-size: 0.65em; opacity: 0.8; margin-top: 2px; color: #555; }
        .card.card-root-special {
            background: linear-gradient(135deg, #fff9e6, #ffedb3); border: 3px solid #f0a500;
            box-shadow: 0 0 0 6px rgba(240,165,0,0.1); border-radius: 24px; padding: 16px 28px;
        }
        
        /* ألوان الفروع */
        .color-root > .card { --branch-color: #b7950b; }
        .color-khulaif > .card { --branch-color: #e67e22; }
        .color-aloosh > .card { --branch-color: #27ae60; }
        .color-hamid > .card { --branch-color: #2980b9; }
        .color-hamido > .card { --branch-color: #c0392b; }

        /* الخطوط العامودية */
        .branch.has-children > .card::after {
            content: ''; position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 40px; background: var(--branch-color, #aaa); opacity: 0.6;
        }
        .children {
            display: flex; flex-direction: row; justify-content: center; gap: 24px;
            position: relative; padding-top: 40px;
        }
        .children > .branch::after {
            content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 40px; background: var(--branch-color, #aaa); opacity: 0.6;
        }

        .manager-actions { display: none; margin-top: 6px; gap: 4px; justify-content: center; flex-wrap: wrap; }
        .show-manager .manager-actions { display: flex; }
        .manager-actions button {
            background: rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.2);
            color: #333; padding: 4px 10px; border-radius: 12px; cursor: pointer; font-size: 0.65em;
        }

        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal.active { display: flex; }
        .form-modal {
            background: white; border: 2px solid #f0a500; border-radius: 20px; padding: 20px;
            width: 320px; max-width: 90vw; max-height: 80vh; overflow-y: auto; text-align: right;
        }
        .form-modal input, .form-modal select {
            width: 100%; padding: 8px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc;
        }
        .form-buttons { display: flex; gap: 8px; margin-top: 15px; justify-content: center; }
        .btn-save { background: #f0a500; color: white; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #333; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; }
        
        @media (max-width: 500px) {
            .toolbar { gap: 8px; padding: 8px 15px; }
            .btn-icon { width: 36px; height: 36px; font-size: 1em; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-group">
            <span class="main-title">🌳 شجرة الدرواشة</span>
            <span class="sub-title">قبيلة بني خالد - عشيرة العليان - فخذ الدرواشة</span>
        </div>
    </div>

    <div class="tree-container" id="treeContainer">
        <div class="tree" id="familyTree"></div>
    </div>

    <!-- شريط الأدوات السفلي -->
    <div class="toolbar" id="toolbar">
        <button class="btn-icon" id="btnSaveHTML" title="حفظ HTML">📄</button>
        <button class="btn-icon" id="btnSaveJSON" title="حفظ JSON">💾</button>
        <button class="btn-icon" id="btnImportJSON" title="استيراد JSON">📂</button>
        <button class="btn-icon" id="toggleManager" title="تسجيل الدخول">🔐</button>
        <!-- يمكن إضافة المزيد لاحقاً -->
    </div>

    <!-- نافذة تسجيل الدخول -->
    <div class="modal" id="loginModal">
        <div class="form-modal">
            <h3>🔐 تسجيل دخول</h3>
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور">
            <div class="form-buttons">
                <button class="btn-save" id="confirmLogin">🔓 دخول</button>
                <button class="btn-cancel" id="cancelLogin">إلغاء</button>
            </div>
        </div>
    </div>

    <input type="file" id="restoreFileInput" style="display:none" accept=".json">

    <script>
// ========== البيانات ==========
var LOCAL_DATA = {name:"عليان",displayName:"عليان",birth:"1200",status:"متوفى رحمه الله",color:"#8B5A2B",isRoot:true,branchCode:"Z",customShape:"default",familyColor:"",children:[{name:"هزيم العليان",displayName:"هزيم",birth:"1230",status:"متوفى رحمه الله",color:"#8B5A2B",branchCode:"Z",customShape:"default",familyColor:"",children:[{name:"عطشان الهزيم",displayName:"عطشان",birth:"1260",status:"متوفى رحمه الله",color:"#8B5A2B",branchCode:"Z",customShape:"default",familyColor:"",children:[{name:"درويش العلياني",displayName:"درويش",birth:"1280",status:"متوفى رحمه الله",color:"color-root",branchCode:"D",customShape:"default",familyColor:"",children:[{name:"خليف الدرويش",displayName:"خليف",birth:"1320",status:"متوفى رحمه الله",color:"color-khulaif",branchCode:"H",customShape:"default",familyColor:"",children:[{name:"محمد الخليف",displayName:"محمد",birth:"1360",status:"متوفى رحمه الله",branchCode:"H",customShape:"default",familyColor:"",children:[{name:"ذياب المحمد",displayName:"ذياب",birth:"1390",status:"حي أطال الله بعمره",branchCode:"H",customShape:"default",familyColor:"",children:[{name:"محمد الذياب",displayName:"محمد",birth:"1420",status:"حي أطال الله بعمره",branchCode:"H",customShape:"default",familyColor:""},{name:"أحمد الذياب",displayName:"أحمد",birth:"1425",status:"حي أطال الله بعمره",branchCode:"H",customShape:"default",familyColor:""},{name:"خالد الذياب",displayName:"خالد",birth:"1430",status:"حي أطال الله بعمره",branchCode:"H",customShape:"default",familyColor:""},{name:"سيار الذياب",displayName:"سيار",birth:"1435",status:"حي أطال الله بعمره",branchCode:"H",customShape:"default",familyColor:""}]}]},{name:"حميد الخليف",displayName:"حميد",birth:"1365",status:"متوفى رحمه الله",branchCode:"H",customShape:"default",familyColor:""},{name:"سليمه الخليف",displayName:"سليمه",birth:"1370",status:"متوفاه رحمها الله",branchCode:"H",customShape:"default",familyColor:""}]},{name:"علوش الدرويش",displayName:"علوش",birth:"1330",status:"متوفى رحمه الله",color:"color-aloosh",branchCode:"A",customShape:"default",familyColor:"",children:[]},{name:"محيميد الدرويش",displayName:"محيميد",birth:"1335",status:"متوفى رحمه الله",color:"color-hamid",branchCode:"M",customShape:"default",familyColor:"",children:[]},{name:"حميدو الدرويش",displayName:"حميدو",birth:"1340",status:"متوفى رحمه الله",color:"color-hamido",branchCode:"E",customShape:"default",familyColor:"",children:[]}]}]},{name:"هملان الهزيم",displayName:"هملان",birth:"1265",status:"متوفى رحمه الله",color:"#8B5A2B",branchCode:"Z",customShape:"default",familyColor:"",children:[{name:"عبلان الهملان",displayName:"عبلان",birth:"1290",status:"متوفى رحمه الله",branchCode:"Z",customShape:"default",familyColor:""}]}]}]};

// ========== النواة ==========
var TreeCore = (function () {
  var rootData = LOCAL_DATA;
  var treeContainer, treeElement;
  var scale = 1, posX = 0, posY = 0;

  function getNickname(person) {
    if (!person.children || !person.children.length) return '';
    return 'أبو ' + person.children[0].name.split(' ')[0];
  }

  function buildTree(data, parentData, parentColor) {
    var branch = document.createElement('div');
    branch.className = 'branch';
    if (data.children && data.children.length) branch.classList.add('has-children');
    var colorClass = data.color || parentColor;
    if (colorClass) branch.classList.add(colorClass);
    
    var card = document.createElement('div');
    card.className = 'card';
    if (data.isRoot) card.classList.add('card-root-special');
    if (data.familyColor) {
      card.style.borderColor = data.familyColor;
      card.style.boxShadow = '0 6px 25px ' + data.familyColor + '40';
    }
    
    var displayName = data.displayName || data.name;
    var nickname = getNickname(data);
    var nicknameHTML = nickname ? '<div style="font-size:0.7em;opacity:0.7;">' + nickname + '</div>' : '';
    
    card.innerHTML = '<div class="name">' + displayName + '</div>' + nicknameHTML +
      '<div class="status-badge">' + (data.status || '') + '</div>' +
      '<div class="manager-actions">' +
      '<button class="add-son">➕ ابن</button>' +
      '<button class="edit-card">✏️ تعديل</button>' +
      '<button class="btn-delete delete-card">🗑️ حذف</button>' +
      '</div>';
      
    card.querySelector('.add-son').addEventListener('click', function(e) {
      e.stopPropagation();
      if (TreeManager && TreeManager.isManager()) openAddForm(branch, data, colorClass);
    });
    card.querySelector('.delete-card').addEventListener('click', function(e) {
      e.stopPropagation();
      if (TreeManager && TreeManager.isManager()) {
        if (confirm('حذف "' + data.name + '"؟')) {
          var p = TreeCore.findParent(rootData, data._id);
          if (p) { p.children = p.children.filter(function(c) { return c._id !== data._id; }); }
          else { rootData = {name:"شجرة فارغة",isRoot:true,children:[]}; }
          TreeCore.saveData(); TreeCore.rebuildTree();
        }
      }
    });
    branch.appendChild(card);

    if (data.children && data.children.length) {
      var childrenDiv = document.createElement('div');
      childrenDiv.className = 'children';
      data.children.forEach(function(child) {
        childrenDiv.appendChild(buildTree(child, data, colorClass));
      });
      branch.appendChild(childrenDiv);
      
      // رسم الخط الأفقي بين الإخوة
      setTimeout(function() {
        var branches = childrenDiv.querySelectorAll(':scope > .branch');
        if (branches.length < 2) return;
        var rect0 = branches[0].getBoundingClientRect();
        var rect1 = branches[branches.length-1].getBoundingClientRect();
        var parentRect = childrenDiv.getBoundingClientRect();
        var x1 = rect0.left + rect0.width/2 - parentRect.left;
        var x2 = rect1.left + rect1.width/2 - parentRect.left;
        var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('width','100%'); svg.setAttribute('height','40');
        svg.style.position='absolute'; svg.style.top='0'; svg.style.left='0';
        svg.style.pointerEvents='none'; svg.style.zIndex='1';
        var path = document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d','M '+x1+' 2 L '+x2+' 2');
        path.setAttribute('stroke', getComputedStyle(card).getPropertyValue('--branch-color').trim() || '#aaa');
        path.setAttribute('stroke-width','2');
        svg.appendChild(path);
        childrenDiv.appendChild(svg);
      }, 100);
    }
    return branch;
  }

  function rebuildTree() {
    treeElement.innerHTML = '';
    treeElement.appendChild(buildTree(rootData, null, null));
  }

  function openAddForm(branchDiv, parentData, parentColor) {
    // فتح نافذة إضافة بسيطة
    var name = prompt('اسم الابن/البنت:');
    if (!name) return;
    var newPerson = { name: name, displayName: name, birth: '', status: 'حي أطال الله بعمره', children: [], branchCode: parentData.branchCode || 'D', _id: 'D-' + Math.random().toString(36).substr(2,6) };
    if (!parentData.children) parentData.children = [];
    parentData.children.push(newPerson);
    TreeCore.saveData();
    rebuildTree();
  }

  function saveData() { localStorage.setItem('familyTreeData', JSON.stringify(rootData)); }

  // التكبير والتحريك
  function setTransform() { treeElement.style.transform = 'translate(' + posX + 'px, ' + posY + 'px) scale(' + scale + ')'; }
  function init(containerId, treeId) {
    treeContainer = document.getElementById(containerId);
    treeElement = document.getElementById(treeId);
    rebuildTree();
    var dragging = false, sx, sy, spx, spy, initDist = 0, initScale = 1;
    treeContainer.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        initDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initScale = scale;
      } else if (e.touches.length === 1 && !e.target.closest('.card, button')) {
        dragging = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY; spx = posX; spy = posY;
      }
    }, { passive: false });
    treeContainer.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (initDist > 0) {
          var ns = Math.min(3, Math.max(0.3, initScale * (d / initDist)));
          var r = treeContainer.getBoundingClientRect();
          var mx = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left;
          var my = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top;
          var f = ns / scale;
          posX = mx - (mx - posX) * f; posY = my - (my - posY) * f; scale = ns;
          setTransform();
        }
      } else if (dragging) {
        posX = spx + e.touches[0].clientX - sx; posY = spy + e.touches[0].clientY - sy;
        setTransform();
      }
    }, { passive: false });
    treeContainer.addEventListener('touchend', function() { initDist = 0; dragging = false; });
    treeContainer.addEventListener('mousedown', function(e) {
      if (e.target.closest('.card, button')) return;
      dragging = true; sx = e.clientX; sy = e.clientY; spx = posX; spy = posY;
    });
    window.addEventListener('mousemove', function(e) { if (!dragging) return; posX = spx + e.clientX - sx; posY = spy + e.clientY - sy; setTransform(); });
    window.addEventListener('mouseup', function() { dragging = false; });
    setTimeout(function() {
      var cr = treeContainer.getBoundingClientRect();
      var tr = treeElement.getBoundingClientRect();
      posX = cr.width/2 - tr.width/2; posY = cr.height/2 - tr.height/2;
      setTransform();
    }, 400);
  }

  return {
    init: init, rebuildTree: rebuildTree, saveData: saveData,
    getRootData: function() { return rootData; },
    findParent: function(obj, id) { /* اختصار */ return null; }
  };
})();

// ========== المدير ==========
var TreeManager = (function() {
  var managerMode = false, currentUser = null;
  var passwords = JSON.parse(localStorage.getItem('treePasswords')) || { manager: '1234', guest: 'زائر', branches: {خليف:'خليفات',علوش:'علوش',محيميد:'محيميد',حميدو:'حميدو'} };
  function login(pass) {
    if (pass === passwords.manager) { currentUser = {type:'manager'}; managerMode = true; document.body.classList.add('show-manager'); document.getElementById('toggleManager').classList.add('active-manager'); return true; }
    else if (pass === passwords.guest) { currentUser = {type:'guest'}; managerMode = false; document.body.classList.remove('show-manager'); return true; }
    for (var b in passwords.branches) { if (pass === passwords.branches[b]) { currentUser = {type:'branch',name:b}; managerMode = false; document.body.classList.remove('show-manager'); return true; } }
    return false;
  }
  function logout() { managerMode = false; currentUser = null; document.body.classList.remove('show-manager'); document.getElementById('toggleManager').classList.remove('active-manager'); }
  return {
    init: function() {
      document.getElementById('toggleManager').addEventListener('click', function() {
        if (currentUser) logout();
        else document.getElementById('loginModal').classList.add('active');
      });
      document.getElementById('confirmLogin').addEventListener('click', function() {
        if (login(document.getElementById('loginPassword').value)) document.getElementById('loginModal').classList.remove('active');
        else alert('❌ كلمة مرور خاطئة');
      });
      document.getElementById('cancelLogin').addEventListener('click', function() { document.getElementById('loginModal').classList.remove('active'); });
    },
    isManager: function() { return managerMode; }
  };
})();

// ========== أزرار الأدوات ==========
document.getElementById('btnSaveJSON').addEventListener('click', function() {
  var blob = new Blob([JSON.stringify(TreeCore.getRootData())], {type:'application/json'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'شجرة_الدرواشة.json'; a.click();
});
document.getElementById('btnSaveHTML').addEventListener('click', function() {
  alert('📄 سيتم تنزيل نسخة HTML قريباً.');
});
document.getElementById('btnImportJSON').addEventListener('click', function() {
  document.getElementById('restoreFileInput').click();
});
document.getElementById('restoreFileInput').addEventListener('change', function(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    localStorage.setItem('familyTreeData', ev.target.result);
    location.reload();
  };
  reader.readAsText(file);
});

// ========== تشغيل ==========
TreeCore.init('treeContainer', 'familyTree');
TreeManager.init();
</script>
</body>
</html>
